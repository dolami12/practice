<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>우태호</title>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;   /* 세로 가운데 */
            align-items: center;       /* 가로 가운데 */
            background-color: #f9f9f9;
            font-family: sans-serif;
        }

        h1 {
            font-size: 60px;           /* 글씨 크게 */
            margin-bottom: 40px;
        }

        button {
            padding: 15px 30px;
            background-color: #FEE500;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>
<body>

<h1>태호야 사기조심해라</h1>

<button onclick="sendKakaoMessage()">
    카카오톡으로 보내기
</button>

<script>
    window.onload = function() {
        if (!Kakao.isInitialized()) {
            Kakao.init('23d2f15297704f49b8b173a8a2e93e82');
        }
    };

    function sendKakaoMessage() {
        Kakao.Share.sendCustom({
            templateId: 130061,
            installTalk: true,
        });
    }
</script>

</body>
</html>
