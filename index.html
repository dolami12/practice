<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>우태호</title>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"></script>
</head>
<body>
    <h1> 태호야 속았냐 </h1>

    <button id="kakao-link-btn" onclick="sendKakaoMessage()" style="padding: 10px 20px; background-color: #FEE500; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
        카카오톡으로 송금 낚시 보내기
    </button>

    <script>
        // 페이지가 완전히 로드된 후 실행되도록 보장합니다.
        window.onload = function() {
            try {
                if (typeof Kakao !== 'undefined') {
                    if (!Kakao.isInitialized()) {
                        // 입력하신 자바스크립트 키로 초기화
                        Kakao.init('23d2f15297704f49b8b173a8a2e93e82');
                        console.log("카카오 SDK 초기화 상태: ", Kakao.isInitialized());
                    }
                }
            } catch (e) {
                console.error("초기화 중 오류 발생:", e);
            }
        };

        function sendKakaoMessage() {
            // 버튼 클릭 시 초기화 상태를 다시 한번 체크합니다.
            if (typeof Kakao === 'undefined') {
                alert("카카오 SDK를 불러오지 못했습니다. 잠시 후 다시 시도해주세요.");
                return;
            }

            if (!Kakao.isInitialized()) {
                Kakao.init('23d2f15297704f49b8b173a8a2e93e82');
            }

            // 템플릿 보내기 실행
            Kakao.Share.sendCustom({
                templateId: 130061, // 입력하신 템플릿 ID
            });
        }
    </script>
</body>
</html>
